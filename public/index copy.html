<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泉佐野チーム 日程管理</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 150px; }
        .box { background-color: #f9f9f9; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        textarea { width: 100%; font-family: monospace; }
    </style>
</head>
<body>
    <h1>試合日程とLINE送信設定</h1>

    <div class="box">
        <h3>新規登録フォーム</h3>
        <div class="form-group">
            <label>日付:</label>
            <input type="text" id="gameDate" placeholder="例: 4月5日">
        </div>
        <div class="form-group">
            <label>対戦相手:</label>
            <input type="text" id="opponent" placeholder="例: 岸高シニア">
        </div>
        <div class="form-group">
            <label>時間割 (1-5):</label>
            <input type="number" id="timeSlot" min="1" max="5" value="3">
        </div>
        <div class="form-group">
            <label>審判担当:</label>
            <input type="checkbox" id="refereeBefore"> 試合前
            <input type="checkbox" id="refereeAfter"> 試合後
        </div>
        <div class="form-group">
            <label>LINE送信予定日時:</label>
            <input type="datetime-local" id="sendDate">
        </div>
        <button id="previewBtn">メッセージをプレビュー</button>
        <button id="saveBtn">データベースに保存</button>
    </div>

    <h3>送信メッセージプレビュー</h3>
    <textarea id="previewArea" rows="12" readonly></textarea>

    <script type="module" src="app.js"></script>
</body>
</html>
